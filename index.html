<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Definitive Unblocked Games</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <!-- Main Header -->
    <header class="main-header">
        <h1 class="site-title">Definitive Unblocked Games</h1>
        <p class="site-subtitle">The largest offline-ready library. Fully functional anywhere.</p>
    </header>

    <!-- Search Section -->
    <section class="search-section">
        <input type="text" id="searchBar" placeholder="Search for a game..." autocomplete="off">
    </section>

    <!-- Storefront Showcase Container -->
    <main class="storefront-container">
        <div class="game-grid" id="gameGrid">
            
            <!-- Empty state message if no games match search -->
            <div id="noResultsMessage" class="no-results" style="display: none;">
                <p>No games found matching that search.</p>
            </div>

            <!-- Sample Game Card 1 -->
            <a href="games/sample-game-1.html" class="card" data-name="sample arcade game test runner one">
                <div class="card-image-placeholder"></div>
                <h3 class="card-title">Sample Game 1</h3>
                <span class="card-tag">Arcade</span>
            </a>

            <!-- Sample Game Card 2 -->
            <a href="games/sample-game-2.html" class="card" data-name="sample puzzle logic block test two">
                <div class="card-image-placeholder"></div>
                <h3 class="card-title">Sample Game 2</h3>
                <span class="card-tag">Puzzle</span>
            </a>

        </div>
    </main>

    <!-- Project Footer -->
    <footer class="site-footer">
        <p>&copy; Definitive Unblocked Games Library. Works online and offline.</p>
    </footer>

    <!-- Load Application Logic -->
    <script src="app.js"></script>
</body>
</html>
